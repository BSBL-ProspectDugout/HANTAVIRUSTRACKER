version: '3.8'

services:
  # Next.js Application
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_NEWS_API_KEY=${NEXT_PUBLIC_NEWS_API_KEY}
      - CDC_API_KEY=${CDC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/outbreaks"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL Database (for future enhancement)
  # Uncomment when you add database support
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_DB=hantavirus
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

# Optional: Named volume for PostgreSQL
# volumes:
#   postgres_data:
